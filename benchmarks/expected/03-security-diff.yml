    severity: blocker
    must_claim_contains: "24"
    rationale: "24x increase in token lifetime without security review is a material risk change"

  - persona: sre
    severity: major
    must_claim_contains: "expir"
    rationale: "Session lifetime change affects incident response — compromised tokens live 24x longer"

  - persona: devils-advocate
    severity: major
    must_claim_contains: "product request"
    rationale: "The comment says 'per product request' — who requested? Where's the ticket?"

not_expected:
