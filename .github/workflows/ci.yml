name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate plugin (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (for markdownlint-cli2)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        shell: bash
        run: |
          # Prefer the official install script; fall back to npm if that fails.
          if curl -fsSL https://claude.ai/install.sh | bash; then
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          else
            npm install -g @anthropic-ai/claude-code
          fi
          # Verify
          which claude || { echo "claude CLI not on PATH after install"; exit 1; }
          claude --version

      - name: Validate plugin manifest
        shell: bash
        run: |
          claude plugin validate . 2>&1 | tee /tmp/dc-validate.out
          # Success indicator varies by CLI version; accept common tokens case-insensitively
          grep -qiE 'valid|passed|success|ok' /tmp/dc-validate.out || {
            echo "claude plugin validate output did not include a success indicator:"
            cat /tmp/dc-validate.out
            exit 1
          }

      - name: JSON sanity checks
        shell: bash
        run: |
          # Belt-and-suspenders: even if the CLI accepts something weird, our schema must hold
          jq -e '.name == "devils-council"' .claude-plugin/plugin.json
          jq -e '.version | test("^[0-9]+\\.[0-9]+\\.[0-9]+")' .claude-plugin/plugin.json
          jq -e '.plugins[0].name == "devils-council" and .plugins[0].source == "./"' .claude-plugin/marketplace.json

      - name: Lint markdown
        shell: bash
        run: npx -y markdownlint-cli2 '**/*.md'

      - name: Install yq (macOS only; ubuntu-latest has it preinstalled)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! command -v yq >/dev/null 2>&1; then
            brew install yq
          fi
          yq --version

      - name: Validate personas
        shell: bash
        run: |
          # Phase 2 PFMT-04: schema-only validator for agents/*.md
          # Safe when agents/ is empty (early Phase 3) — validator exits 0 in that case.
          ./scripts/validate-personas.sh

      - name: Run persona-validator self-tests
        shell: bash
        run: |
          # Exercises the validator against tests/fixtures/personas/{valid,invalid}-*.md
          # to catch regressions in the validator itself (not just in agents/*.md).
          ./scripts/test-validate-personas.sh

      - name: Run shell-inject pre-parser (Phase 1 TD-04)
        shell: bash
        run: |
          # Phase 1 TD-04: dry-run pre-parser for !`<cmd>` shell-inject patterns
          # in commands/*.md. Regression target: v1.0.0 P0 (git commit da45340).
          # Runs on every push; mirror of the PreToolUse hook for CI backstop.
          if [ -x scripts/validate-shell-inject.sh ]; then
            scripts/validate-shell-inject.sh commands/*.md
          else
            echo "shell-inject parser skipped — scripts/validate-shell-inject.sh not yet present"
          fi

      - name: Run shell-inject fixture suite (Phase 1 TD-04)
        shell: bash
        run: |
          # Runs the 6-fixture corpus under tests/fixtures/shell-inject/
          # Asserts parser exits match expected per fixture (P0 regression MUST fail parser).
          if [ -x scripts/test-shell-inject.sh ] && [ -d tests/fixtures/shell-inject ]; then
            ./scripts/test-shell-inject.sh
          else
            echo "shell-inject fixture suite skipped — scripts/test-shell-inject.sh or fixtures not yet present"
          fi

      - name: Run engine smoke test (Phase 3 — bin/dc-prep.sh + bin/dc-validate-scorecard.sh)
        shell: bash
        run: |
          # Plan 05: integration test for the Phase 3 shell components.
          # Tests bin/dc-prep.sh and bin/dc-validate-scorecard.sh directly with a
          # mocked subagent draft. Per ADD-2, no headless `claude` invocation.
          # Skips gracefully until bin/dc-prep.sh exists (e.g., first Plan-01 commit).
          if [ -x bin/dc-prep.sh ] && [ -x bin/dc-validate-scorecard.sh ]; then
            ./scripts/test-engine-smoke.sh
          else
            echo "engine smoke test skipped — bin/dc-prep.sh or bin/dc-validate-scorecard.sh not yet present"
          fi

      - name: Run Chair synthesis test
        shell: bash
        run: |
          # Phase 5 CHAIR-01..06 integration test.
          # Prebuilt-run-dir technique — does NOT invoke `claude` headlessly.
          # Exercises bin/dc-validate-scorecard.sh (ID stamping) +
          # bin/dc-validate-synthesis.sh + commands/review.md render wiring.
          ./scripts/test-chair-synthesis.sh

      - name: Run Chair strictness test (Phase 1 TD-05)
        shell: bash
        run: |
          # Phase 1 TD-05: Chair Top-3 composite-target strictness regression gate.
          # Exercises bin/dc-validate-synthesis.sh against 6 fixtures including
          # 08-UAT-known-good (D-08 regression gate per PITFALLS.md P-08).
          if [ -x scripts/test-chair-strictness.sh ] && [ -d tests/fixtures/chair-strictness ]; then
            ./scripts/test-chair-strictness.sh
          else
            echo "chair-strictness test skipped — scripts/test-chair-strictness.sh or fixtures not yet present"
          fi

      - name: "Run classifier tests — NEGATIVES FIRST (Phase 3 D-16, P-02 prevention)"
        shell: bash
        run: |
          # Phase 3 D-16: negative fixtures MUST run before positives to prevent
          # positive-bias masking false-positives. This step runs ONLY negatives.
          # If any negative fires its detector, this step exits 1 and the
          # subsequent positives step never runs — this is the load-bearing
          # CI-level enforcement of inverted-TDD ordering.
          if [ -f lib/classify.py ] && [ -x bin/dc-classify.sh ]; then
            ./scripts/test-classify.sh --negatives-only
          else
            echo "classifier negatives skipped — lib/classify.py or bin/dc-classify.sh not yet present"
          fi

      - name: "Run classifier tests — POSITIVES (Phase 3 + legacy v1.0)"
        shell: bash
        run: |
          # Runs the 5 new-detector positive assertions + all 17 legacy v1.0
          # positive assertions + MANIFEST shape check. Only reached if the
          # negatives step above passed (GH Actions default: step failure halts
          # subsequent steps). This is the second half of D-16 enforcement.
          if [ -f lib/classify.py ] && [ -x bin/dc-classify.sh ]; then
            ./scripts/test-classify.sh --positives-only
          else
            echo "classifier positives skipped — lib/classify.py or bin/dc-classify.sh not yet present"
          fi

      - name: Run budget-cap tests (Phase 6 BNCH-05, BNCH-07)
        shell: bash
        run: |
          # Tests bin/dc-budget-plan.sh against 5+ cap/filter scenarios.
          # Skips gracefully if bin/dc-budget-plan.sh not present.
          if [ -x bin/dc-budget-plan.sh ]; then
            ./scripts/test-budget-cap.sh
          else
            echo "budget-cap tests skipped — bin/dc-budget-plan.sh not yet present"
          fi

      - name: Run codex-delegation tests (Phase 6 CDEX-03, CDEX-05)
        shell: bash
        run: |
          # Tests bin/dc-codex-delegate.sh against all 6 error classes + success
          # using PATH-injected shell stubs. Does NOT invoke live codex CLI.
          if [ -x bin/dc-codex-delegate.sh ]; then
            ./scripts/test-codex-delegation.sh
          else
            echo "codex-delegation tests skipped — bin/dc-codex-delegate.sh not yet present"
          fi

      - name: Run cache-reduction test (Phase 6 BNCH-06, D-61)
        shell: bash
        env:
          # Set DC_SKIP_LIVE_CACHE_TEST=1 to force-skip in CI environments
          # where `claude` CLI auth is not configured for headless runs.
          # Default behavior: run if claude CLI is on PATH AND spike outcome
          # permits (read from 06-CACHE-SPIKE-MEMO.md by the test script itself).
          DC_SKIP_LIVE_CACHE_TEST: "1"
        run: |
          if [ -x scripts/test-cache-reduction.sh ]; then
            ./scripts/test-cache-reduction.sh
          else
            echo "cache-reduction test skipped — scripts/test-cache-reduction.sh not yet present"
          fi

      - name: Run dropped-scorecard test (Phase 7 HARD-02)
        shell: bash
        run: |
          # Plan 02: validator HARD-02 zero-kept branch writes stub + MANIFEST flags.
          # Skips gracefully if scripts/test-dropped-scorecard.sh or the fixture set is not yet present.
          if [ -x scripts/test-dropped-scorecard.sh ] && [ -f tests/fixtures/dropped-scorecard/all-findings-fail.md ]; then
            ./scripts/test-dropped-scorecard.sh
          else
            echo "dropped-scorecard test skipped — scripts/test-dropped-scorecard.sh or fixtures not yet present"
          fi

      - name: Run coexistence test (Phase 7 HARD-05)
        shell: bash
        run: |
          # Plan 03: static collision-check across devils-council + (optional) Superpowers + GSD.
          # CI has neither Superpowers nor GSD installed — the script SKIPs those branches and runs the rest.
          if [ -x scripts/test-coexistence.sh ]; then
            ./scripts/test-coexistence.sh
          else
            echo "coexistence test skipped — scripts/test-coexistence.sh not yet present"
          fi

      - name: Run injection corpus test (Phase 7 HARD-01)
        shell: bash
        env:
          # Mock-mode is the only supported CI path per Plan 05. Live-Agent run requires Claude Code CLI auth which CI does not have.
          DC_MOCK_INJECTION_CORPUS: "1"
        run: |
          # Plan 04+05: 9-fixture corpus + static D-68 grep + tool-hijack no-side-effect audit + D-62 over-budget fold-in.
          # Depends on bin/dc-prep.sh, bin/dc-validate-scorecard.sh, and the 9 fixture files under tests/fixtures/injection-corpus/.
          if [ -x scripts/test-injection-corpus.sh ] \
              && [ -d tests/fixtures/injection-corpus/inject-ignore ] \
              && [ -d tests/fixtures/injection-corpus/role-confusion ] \
              && [ -d tests/fixtures/injection-corpus/tool-hijack ] \
              && [ -x bin/dc-prep.sh ] \
              && [ -x bin/dc-validate-scorecard.sh ]; then
            ./scripts/test-injection-corpus.sh
          else
            echo "injection-corpus test skipped — scripts/test-injection-corpus.sh, fixtures, or engine binaries not yet present"
          fi

      - name: Run responses-suppression test (Phase 7 RESP-01 + RESP-03)
        shell: bash
        run: |
          # Plan 06: two-run test — Run 1 bootstraps responses.md, annotate one dismissed, Run 2 asserts suppression.
          # Depends on bin/dc-apply-responses.sh + bin/dc-validate-scorecard.sh + fixtures under tests/fixtures/responses-suppression/.
          if [ -x scripts/test-responses-suppression.sh ] \
              && [ -x bin/dc-apply-responses.sh ] \
              && [ -f tests/fixtures/responses-suppression/scorecard-sample.md ]; then
            ./scripts/test-responses-suppression.sh
          else
            echo "responses-suppression test skipped — scripts/test-responses-suppression.sh, binary, or fixtures not yet present"
          fi

      - name: Run severity-render test (Phase 7 RESP-04)
        shell: bash
        run: |
          # Plan 07: render-transform spec test against prebuilt fixtures (default + --show-nits modes).
          if [ -x scripts/test-severity-render.sh ] \
              && [ -f tests/fixtures/severity-render/staff-engineer.md ]; then
            ./scripts/test-severity-render.sh
          else
            echo "severity-render test skipped — scripts/test-severity-render.sh or fixtures not yet present"
          fi

      - name: Run GSD hook guard test (Phase 8 GSDI-03, GSDI-04)
        shell: bash
        run: |
          # Plan 01: exercises bin/dc-gsd-wrap.sh across the three guard-logic paths.
          # Skips gracefully if bin/dc-gsd-wrap.sh or scripts/test-hooks-gsd-guard.sh not yet present.
          if [ -x scripts/test-hooks-gsd-guard.sh ] && [ -x bin/dc-gsd-wrap.sh ]; then
            ./scripts/test-hooks-gsd-guard.sh
          else
            echo "hooks-gsd-guard test skipped — scripts/test-hooks-gsd-guard.sh or bin/dc-gsd-wrap.sh not yet present"
          fi

      - name: Run on-plan / on-code wrapper test (Phase 8 GSDI-01, GSDI-02)
        shell: bash
        run: |
          # Plan 02: exercises glob discovery + git log --diff-filter=A anchor + --from fallback
          # against synthetic fixtures. Does NOT invoke live slash commands.
          # Skips gracefully if scripts/test-on-plan-on-code.sh or commands/*.md not yet present.
          if [ -x scripts/test-on-plan-on-code.sh ] && [ -f commands/on-plan.md ] && [ -f commands/on-code.md ]; then
            ./scripts/test-on-plan-on-code.sh
          else
            echo "on-plan/on-code test skipped — scripts/test-on-plan-on-code.sh or commands not yet present"
          fi

      - name: Run dig-spawn test (Phase 8 RESP-02)
        shell: bash
        run: |
          # Plan 03: exercises commands/dig.md shell logic (persona regex, run-id path-traversal,
          # latest sentinel, missing-scorecard error, ephemeral invariant) against a fixture .council/.
          # Skips gracefully if scripts/test-dig-spawn.sh, commands/dig.md, or fixture not present.
          if [ -x scripts/test-dig-spawn.sh ] \
              && [ -f commands/dig.md ] \
              && [ -f tests/fixtures/dig-spawn/latest-run/staff-engineer.md ]; then
            ./scripts/test-dig-spawn.sh
          else
            echo "dig-spawn test skipped — scripts/test-dig-spawn.sh, commands/dig.md, or fixture not yet present"
          fi

      - name: Confirm no settings.json hijack (PLUG-05)
        shell: bash
        run: |
          if [ -f settings.json ] || [ -f .claude-plugin/settings.json ]; then
            echo "ERROR: plugin ships settings.json which may hijack the main thread (PLUG-05 violation)"
            exit 1
          fi

      - name: Confirm skeleton directories exist
        shell: bash
        run: |
          for d in agents commands skills scripts bin hooks; do
            test -d "$d" || { echo "Missing directory: $d"; exit 1; }
          done
